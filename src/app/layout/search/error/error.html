  <table class="results table table-striped table-success table-bordered border-primary">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Username</th>
        </tr>
        @for (item of Results; track item) { 
        <tr>
          <td>{{ item.id }}</td>
          <td>{{ item.name }}</td>
          <td>{{ item.email }}</td>
          <td>{{ item.username }}</td>
        </tr>
        }
      </table>
      <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>
@if (error()) {
  <div class="alert alert-danger" role="alert">
    Error: {{ error() }}
  </div>
}
