<header class="bg-light border-bottom py-3">
  <div class="container d-flex justify-content-between align-items-center">

    <h3 class="m-0 fw-bold">Employee Management</h3>

    <div class="btn-group">
      <button class="btn btn-primary" routerLink="/employee/list" (click)="onListEmployees()">
        <i class="bi bi-list"></i> List Employee
      </button>

      <button class="btn btn-success" routerLink="/employee/add" (click)="onAddEmployee()">
        <i class="bi bi-plus-circle"></i> Add Employee
      </button>
    </div>

  </div>
</header>
