<app-header></app-header>
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">

          <h3 class="text-center mb-4 fw-bold">Reactive Java Form</h3>

          <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

            <!-- Full Name -->
            <div class="mb-3 d-flex align-items-center justify-content-between">
              <label class="form-label text-nowrap">Full Name</label>
              <input type="text" class="form-control customwidth"
                     formControlName="fullName"
                     placeholder="Enter full name">

              <div class="text-danger mt-1"
                   *ngIf="registerForm.get('fullName')?.touched &&
                          registerForm.get('fullName')?.invalid">
                Full Name is required
              </div>
            </div>
             <div class="mb-3 d-flex align-items-center justify-content-between">
                <label class="form-label text-nowrap">salary</label>
              <input type="text" class="form-control customwidth"
                     formControlName="salary"
                     placeholder="salary">
            </div>

            <!-- Email -->
            <div class="mb-3 d-flex align-items-center justify-content-between">
              <label class="form-label text-nowrap">Email</label>
              <input type="email" class="form-control customwidth"
                     formControlName="email"
                     placeholder="Enter email">

              <div class="text-danger mt-1"
                   *ngIf="registerForm.get('email')?.touched &&
                          registerForm.get('email')?.invalid">
                <span *ngIf="registerForm.get('email')?.errors?.['required']">Email is required</span>
                <span *ngIf="registerForm.get('email')?.errors?.['email']">Enter a valid email</span>
              </div>
            </div>

            <!-- Password -->
            <div class="mb-3 d-flex align-items-center justify-content-between">
              <label class="form-label  text-nowrap">Password</label>
              <input type="password" class="form-control customwidth"
                     formControlName="password"
                     placeholder="Enter password">

              <div class="text-danger mt-1"
                   *ngIf="registerForm.get('password')?.touched &&
                          registerForm.get('password')?.invalid">
                Password must be at least 6 characters
              </div>
            </div>

            <!-- Phone -->
            <!-- <div class="mb-3">
              <label class="form-label">salary</label>
              <input type="text" class="form-control"
                     formControlName="salary"
                     placeholder="Enter salary">
            </div> -->

            <button type="submit"
                    class="btn btn-primary w-100"
                    [disabled]="registerForm.invalid">
              Register
            </button>
          </form>

        </div>
      </div>

    </div>
  </div>
</div>
